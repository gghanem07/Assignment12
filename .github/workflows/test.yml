name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and start database
        run: docker compose up -d db

      - name: Wait for database health
        run: |
          for i in {1..20}; do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' assignment12-db-1 || true)
            echo "DB health: $STATUS"
            if [ "$STATUS" = "\"healthy\"" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Database did not become healthy in time"
          docker ps
          docker logs assignment12-db-1
          exit 1

      - name: Run tests in Docker
        run: docker compose run --rm web pytest --no-cov

      - name: Show database logs on failure
        if: failure()
        run: docker logs assignment12-db-1

  security:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t app:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:test'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            gghanem07/assignment12:latest
            gghanem07/assignment12:${{ github.sha }}
          platforms: linux/amd64,linux/arm64